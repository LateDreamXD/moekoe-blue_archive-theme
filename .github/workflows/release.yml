name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and release
    strategy:
      matrix:
        node: [ lts/* ]
        os: [ ubuntu-latest ]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - name: Install dependencies
        run: npm install
      - name: Build
        run: |
          npm run build
          cp LICENSE dist/LICENSE
          mkdir plugin
          mkdir plugin/ba-theme
          mv dist/* plugin/ba-theme
      - uses: TheDoctor0/zip-release@0.7.6
        with:
          directory: plugin
          filename: 'ba-theme-${{ github.ref_name }}.zip'
      - uses: ncipollo/release-action@v1
        with:
          artifacts: 'plugin/ba-theme-${{ github.ref_name }}.zip'
          draft: true

